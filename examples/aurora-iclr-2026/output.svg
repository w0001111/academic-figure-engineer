<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1700 920" role="img" aria-labelledby="title desc">
  <title id="title">Clean evidence-traceable Aurora architecture reconstruction</title>
  <desc id="desc">A simplified original SVG reconstruction of Aurora showing three modalities, multimodal domain-knowledge extraction, modality-guided temporal modeling, and prototype-guided generative forecasting.</desc>
  <defs>
    <style>
      .bg { fill: #fbfcfe; }
      .title { font: 750 28px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #1f2937; text-anchor: middle; }
      .subtitle { font: 500 15px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #5b6472; text-anchor: middle; }
      .band { fill: #ffffff; stroke: #d8dee9; stroke-width: 2; rx: 24; }
      .band-label { font: 750 19px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #334155; }
      .node { fill: #f4f6f8; stroke: #64748b; stroke-width: 2.2; rx: 16; }
      .input { fill: #eef4fb; stroke: #4f6f94; }
      .knowledge { fill: #e8f6f2; stroke: #16806b; stroke-width: 3.2; }
      .core { fill: #dff3ef; stroke: #0f766e; stroke-width: 4; }
      .decoder { fill: #f6f1e8; stroke: #8b6f47; }
      .output { fill: #fdecc8; stroke: #a96f13; stroke-width: 2.6; }
      .label { font: 750 20px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #1f2937; text-anchor: middle; }
      .small { font: 500 14px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #4b5563; text-anchor: middle; }
      .mini { font: 600 12.5px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #64748b; text-anchor: middle; }
      .tag { font: 750 13px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #0f766e; text-anchor: middle; }
      .edge { fill: none; stroke: #374151; stroke-width: 3; marker-end: url(#arrow); }
      .guide { fill: none; stroke: #0f766e; stroke-width: 3; stroke-dasharray: 8 7; marker-end: url(#arrow-green); }
      .light { fill: none; stroke: #94a3b8; stroke-width: 2.4; marker-end: url(#arrow-muted); }
      .edge-label { font: 650 13px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #374151; text-anchor: middle; }
      .note { font: 500 14px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #5b6472; }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#374151"/></marker>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#0f766e"/></marker>
    <marker id="arrow-muted" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#94a3b8"/></marker>
  </defs>

  <rect class="bg" x="0" y="0" width="1700" height="920"/>
  <text class="title" x="850" y="58">Aurora architecture: multimodal knowledge-guided generative forecasting</text>
  <text class="subtitle" x="850" y="86">Original simplified SVG reconstruction from the supplied ICLR 2026 PDF · evidence anchors are documented in figure-spec.yaml</text>

  <g id="band-domain-knowledge">
    <rect class="band" x="70" y="130" width="1560" height="250"/>
    <text class="band-label" x="105" y="170">Domain-knowledge layer</text>
    <g id="node-text">
      <rect class="node input" x="155" y="210" width="220" height="95"/>
      <text class="label" x="265" y="248"><tspan x="265">Text</tspan><tspan x="265" dy="26">description</tspan></text>
      <text class="small" x="265" y="287">domain trend hints</text>
    </g>
    <g id="node-image">
      <rect class="node input" x="430" y="210" width="240" height="95"/>
      <text class="label" x="550" y="248"><tspan x="550">Endogenous</tspan><tspan x="550" dy="26">image</tspan></text>
      <text class="small" x="550" y="287">periodic geometry</text>
    </g>
    <g id="node-encoders">
      <rect class="node knowledge" x="760" y="190" width="280" height="135"/>
      <text class="tag" x="900" y="216">compressed external knowledge</text>
      <text class="label" x="900" y="255"><tspan x="900">ViT / BERT encoders</tspan><tspan x="900" dy="28">+ token distillation</tspan></text>
      <text class="small" x="900" y="303">Eq. (8)–(11)</text>
    </g>
    <g id="node-prototypes">
      <rect class="node knowledge" x="1165" y="190" width="300" height="135"/>
      <text class="tag" x="1315" y="216">future prior</text>
      <text class="label" x="1315" y="255"><tspan x="1315">Prototype bank</tspan><tspan x="1315" dy="28">+ retriever</tspan></text>
      <text class="small" x="1315" y="303">period / trend prototypes · Eq. (24)</text>
    </g>
  </g>

  <g id="band-temporal-modeling">
    <rect class="band" x="70" y="430" width="1560" height="300"/>
    <text class="band-label" x="105" y="470">Temporal forecasting backbone</text>
    <g id="node-series">
      <rect class="node input" x="145" y="535" width="230" height="100"/>
      <text class="label" x="260" y="575"><tspan x="260">Raw time series</tspan><tspan x="260" dy="26">X</tspan></text>
      <text class="small" x="260" y="617">historical context</text>
    </g>
    <g id="node-tokenize">
      <rect class="node decoder" x="445" y="535" width="245" height="100"/>
      <text class="label" x="568" y="575"><tspan x="568">RevIN + patching</tspan><tspan x="568" dy="26">+ embedding</tspan></text>
      <text class="small" x="568" y="617">time tokens · Eq. (1)–(2)</text>
    </g>
    <g id="node-attention">
      <rect class="node core" x="770" y="505" width="305" height="160"/>
      <text class="tag" x="923" y="532">main contribution in encoder</text>
      <text class="label" x="923" y="573"><tspan x="923">Modality-guided</tspan><tspan x="923" dy="28">self-attention</tspan></text>
      <text class="small" x="923" y="623">multimodal Corr guides temporal attention</text>
      <text class="mini" x="923" y="648">Eq. (12)–(18)</text>
    </g>
    <g id="node-fuse">
      <rect class="node decoder" x="1145" y="535" width="245" height="100"/>
      <text class="label" x="1268" y="575"><tspan x="1268">Multimodal</tspan><tspan x="1268" dy="26">fusion</tspan></text>
      <text class="small" x="1268" y="617">X_fuse · Eq. (19)–(21)</text>
    </g>
  </g>

  <g id="band-generation">
    <rect class="band" x="70" y="770" width="1560" height="95"/>
    <text class="band-label" x="105" y="826">Generative decoding</text>
    <g id="node-condition">
      <rect class="node decoder" x="435" y="788" width="250" height="58"/>
      <text class="label" x="560" y="824">Condition decoder</text>
    </g>
    <g id="node-flow">
      <rect class="node core" x="780" y="780" width="300" height="74"/>
      <text class="label" x="930" y="810"><tspan x="930">Prototype-guided</tspan><tspan x="930" dy="26">flow matching</tspan></text>
    </g>
    <g id="node-output">
      <rect class="node output" x="1200" y="788" width="250" height="58"/>
      <text class="label" x="1325" y="824">Probabilistic forecast</text>
    </g>
  </g>

  <g id="edges-main">
    <path class="light" d="M375 258 L760 258"/>
    <path class="light" d="M670 258 L760 258"/>
    <path class="edge" d="M1040 258 L1165 258"/>
    <text class="edge-label" x="1103" y="244">text / image reps</text>

    <path class="edge" d="M375 585 L445 585"/>
    <text class="edge-label" x="410" y="570">series</text>
    <path class="edge" d="M690 585 L770 585"/>
    <text class="edge-label" x="730" y="570">tokens</text>
    <path class="edge" d="M1075 585 L1145 585"/>
    <text class="edge-label" x="1110" y="570">temporal rep.</text>
    <path class="edge" d="M1390 585 C1485 620, 1490 790, 1450 817"/>
    <text class="edge-label" x="1510" y="706">X_fuse</text>

    <path class="guide" d="M900 325 C900 390, 900 455, 900 505"/>
    <text class="edge-label" x="1002" y="415">domain knowledge guides attention</text>
    <path class="guide" d="M1315 325 C1265 455, 1135 715, 1010 780"/>
    <text class="edge-label" x="1270" y="548">period / trend prior</text>

    <path class="edge" d="M1268 635 C1210 725, 700 710, 560 788"/>
    <text class="edge-label" x="875" y="728">future conditions</text>
    <path class="edge" d="M685 817 L780 817"/>
    <path class="edge" d="M1080 817 L1200 817"/>
    <text class="edge-label" x="1138" y="802">sampled future tokens</text>
  </g>

  <g id="legend" transform="translate(98 895)">
    <text class="note" x="0" y="0">Legend: solid arrows = primary representation flow; dashed green arrows = multimodal guidance / prototype prior; green blocks = proposed Aurora components.</text>
  </g>
</svg>
