<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1800 980" role="img" aria-labelledby="title desc">
  <title id="title">Evidence-traceable Aurora multimodal time-series architecture reconstruction</title>
  <desc id="desc">Original SVG reconstruction showing Aurora's multimodal tokenization, encoding, modality-guided attention, fusion, condition decoding, prototype retrieval, and prototype-guided flow matching for probabilistic forecasting.</desc>
  <defs>
    <style>
      .bg { fill: #fbfcfe; }
      .panel { fill: #ffffff; stroke: #d8dee9; stroke-width: 2; rx: 24; }
      .panel-title { font: 700 24px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #263241; }
      .node { fill: #f4f6f8; stroke: #697386; stroke-width: 2.2; rx: 16; }
      .data { fill: #eef4fb; stroke: #516b8a; }
      .process { fill: #f5f3ef; stroke: #756d61; }
      .key { fill: #dff3ef; stroke: #16806b; stroke-width: 4; }
      .output { fill: #fdecc8; stroke: #a96f13; }
      .label { font: 700 20px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #1f2937; text-anchor: middle; }
      .small { font: 500 14px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #4b5563; text-anchor: middle; }
      .tag { font: 700 13px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #126b5b; text-anchor: middle; }
      .edge { fill: none; stroke: #374151; stroke-width: 2.8; marker-end: url(#arrow); }
      .edge-soft { fill: none; stroke: #6b7280; stroke-width: 2.3; marker-end: url(#arrow-muted); }
      .edge-label { font: 600 13px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #374151; text-anchor: middle; }
      .caption { font: 500 14px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #4b5563; }
      .formula { font: 600 15px "Menlo", "Consolas", monospace; fill: #374151; text-anchor: middle; }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#374151"/></marker>
    <marker id="arrow-muted" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#6b7280"/></marker>
  </defs>
  <rect class="bg" x="0" y="0" width="1800" height="980"/>
  <text x="900" y="58" class="panel-title" text-anchor="middle">Original evidence-traceable reconstruction of Aurora</text>
  <text x="900" y="86" class="caption" text-anchor="middle">Multimodal time-series foundation model for generative probabilistic forecasting; based on supplied ICLR 2026 PDF, not copied from paper figures.</text>

  <g id="panel-inputs">
    <rect class="panel" x="55" y="135" width="405" height="650"/>
    <text x="258" y="178" class="panel-title" text-anchor="middle">Multimodal inputs</text>
    <g id="node-time-series"><rect class="node data" x="105" y="230" width="230" height="82"/><text class="label" x="220" y="263"><tspan x="220">Time series</tspan><tspan x="220" dy="25">X</tspan></text></g>
    <g id="node-time-tokenization"><rect class="node process" x="115" y="355" width="255" height="92"/><text class="label" x="243" y="388"><tspan x="243">RevIN + patching</tspan><tspan x="243" dy="25">+ embedding</tspan></text><text class="small" x="243" y="430">Eq. (1)-(2)</text></g>
    <g id="node-image-rendering"><rect class="node process" x="115" y="492" width="255" height="98"/><text class="label" x="243" y="527"><tspan x="243">Endogenous image</tspan><tspan x="243" dy="25">rendering</tspan></text><text class="small" x="243" y="570">FFT period view · Eq. (3)-(7)</text></g>
    <g id="node-text-tokenization"><rect class="node process" x="115" y="635" width="255" height="82"/><text class="label" x="243" y="668"><tspan x="243">Text description</tspan><tspan x="243" dy="25">tokenization</tspan></text></g>
  </g>

  <g id="panel-encoder">
    <rect class="panel" x="520" y="135" width="660" height="650"/>
    <text x="850" y="178" class="panel-title" text-anchor="middle">Cross-modality encoder</text>
    <g id="node-vision-text-encoders"><rect class="node process" x="580" y="260" width="235" height="90"/><text class="label" x="698" y="294"><tspan x="698">ViT / BERT</tspan><tspan x="698" dy="25">encoders</tspan></text><text class="small" x="698" y="333">Eq. (8)-(9)</text></g>
    <g id="node-token-distillation"><rect class="node key" x="585" y="430" width="235" height="110"/><text class="tag" x="703" y="456">Proposed component</text><text class="label" x="703" y="492"><tspan x="703">Token</tspan><tspan x="703" dy="25">distillation</tspan></text><text class="small" x="703" y="525">Eq. (10)-(11)</text></g>
    <g id="node-guided-attention"><rect class="node key" x="875" y="330" width="245" height="126"/><text class="tag" x="998" y="356">Proposed component</text><text class="label" x="998" y="392"><tspan x="998">Modality-guided</tspan><tspan x="998" dy="25">self-attention</tspan></text><text class="small" x="998" y="433">Corr guides temporal attention</text></g>
    <g id="node-fusion"><rect class="node process" x="870" y="555" width="255" height="95"/><text class="label" x="998" y="590"><tspan x="998">Cross-attention</tspan><tspan x="998" dy="25">modality fuser</tspan></text><text class="small" x="998" y="632">X_fuse · Eq. (19)-(21)</text></g>
    <text class="formula" x="1010" y="495">Corr = V<tspan baseline-shift="sub">Attn</tspan> · W · T<tspan baseline-shift="sub">Attn</tspan><tspan baseline-shift="super">T</tspan></text>
  </g>

  <g id="panel-decoder">
    <rect class="panel" x="1240" y="135" width="500" height="650"/>
    <text x="1490" y="178" class="panel-title" text-anchor="middle">Generative decoder</text>
    <g id="node-condition-decoder"><rect class="node process" x="1310" y="250" width="250" height="90"/><text class="label" x="1435" y="284"><tspan x="1435">Condition</tspan><tspan x="1435" dy="25">decoder</tspan></text><text class="small" x="1435" y="323">Eq. (22)-(23)</text></g>
    <g id="node-prototype-retriever"><rect class="node key" x="1310" y="400" width="250" height="105"/><text class="tag" x="1435" y="425">Proposed component</text><text class="label" x="1435" y="461"><tspan x="1435">Prototype bank</tspan><tspan x="1435" dy="25">+ retriever</tspan></text><text class="small" x="1435" y="492">period / trend prototypes</text></g>
    <g id="node-flow-matching"><rect class="node key" x="1320" y="565" width="275" height="105"/><text class="tag" x="1458" y="590">Proposed component</text><text class="label" x="1458" y="626"><tspan x="1458">Prototype-guided</tspan><tspan x="1458" dy="25">flow matching</tspan></text></g>
    <g id="node-forecast"><rect class="node output" x="1395" y="720" width="210" height="78"/><text class="label" x="1500" y="753"><tspan x="1500">Probabilistic</tspan><tspan x="1500" dy="25">forecast</tspan></text></g>
  </g>

  <g id="edges">
    <path class="edge" d="M220 312 L220 355"/><text class="edge-label" x="300" y="338">raw series</text>
    <path class="edge-soft" d="M335 270 C415 270, 430 520, 115 540"/><text class="edge-label" x="408" y="410">FFT / period view</text>
    <path class="edge" d="M370 542 C455 542, 505 322, 580 310"/><text class="edge-label" x="485" y="430">image tokens</text>
    <path class="edge" d="M370 675 C465 675, 505 330, 580 326"/><text class="edge-label" x="476" y="585">text tokens</text>
    <path class="edge" d="M698 350 L703 430"/><text class="edge-label" x="760" y="392">hidden reps</text>
    <path class="edge" d="M370 402 C575 392, 720 378, 875 388"/><text class="edge-label" x="600" y="378">X_time</text>
    <path class="edge" d="M820 488 C858 470, 870 440, 875 405"/><text class="edge-label" x="855" y="474">Corr guidance</text>
    <path class="edge" d="M1000 456 L998 555"/><text class="edge-label" x="1080" y="515">temporal rep.</text>
    <path class="edge" d="M820 505 C858 535, 870 572, 870 602"/><text class="edge-label" x="830" y="570">distilled modalities</text>
    <path class="edge" d="M1125 600 C1195 600, 1235 300, 1310 295"/><text class="edge-label" x="1225" y="425">X_fuse</text>
    <path class="edge" d="M820 508 C1030 690, 1200 452, 1310 452"/><text class="edge-label" x="1115" y="676">text / image reps</text>
    <path class="edge" d="M1435 340 L1435 565"/><text class="edge-label" x="1530" y="380">future conditions</text>
    <path class="edge" d="M1435 505 L1452 565"/><text class="edge-label" x="1580" y="535">prototypes</text>
    <path class="edge" d="M1485 670 L1500 720"/><text class="edge-label" x="1605" y="698">sampled tokens</text>
  </g>

  <g id="legend" transform="translate(80 855)">
    <text class="caption" x="0" y="0">Legend: solid arrows = data / representation flow; accent blocks = proposed Aurora components; warm block = forecast output.</text>
    <text class="caption" x="0" y="28">Evidence note: source anchors for every major node and edge are documented in figure-spec.yaml.</text>
  </g>
</svg>
