    - "Warm block: forecast output"

caption:
  draft: "Evidence-traceable reconstruction of Aurora, a multimodal time series foundation model. Time-series, endogenous image, and text modalities are tokenized and encoded; image/text tokens are distilled into compact domain knowledge that guides temporal self-attention and multimodal fusion. The decoder generates future conditions and retrieves period/trend prototypes for prototype-guided flow matching, producing probabilistic forecasts."

validation:
  scientific_checks:
    - "Each major node and edge is tied to abstract, Section 3.1, Section 3.2, equations, or Algorithm 1."
    - "The figure separates encoding and decoding while avoiding reproduction of original paper figures."
  visual_checks:
    - "Designed as a compact double-column SVG with editable text."
  unresolved_items:
    - "Low-level implementation details, experimental benchmark results, and corpus construction details are omitted to keep the central architecture readable."
