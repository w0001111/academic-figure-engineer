figure:
  title: "Evidence-traceable Aurora multimodal time-series foundation model reconstruction"
  purpose: "Show how Aurora transforms time series, text, and endogenous image modalities into probabilistic future forecasts."
  central_message: "Aurora extracts multimodal domain knowledge from text and image modalities, injects it into temporal representation learning, and uses prototype-guided flow matching for generative probabilistic forecasting."
  audience: "machine learning and time-series forecasting researchers"
  type: "model_architecture"
  target_format: "double-column"
  orientation: "left-to-right"
  style_preset: "ICLR / IEEE-style compact model architecture"

source_evidence:
  manuscript_sections:
    - "Abstract: multimodal inputs, zero-shot inference, tokenization, encoding, distillation, Modality-Guided Multi-head Self-Attention, Prototype-Guided Flow Matching"
    - "Section 3.1 Encoding"
    - "Section 3.1.1 Multimodal Tokenization"
    - "Section 3.1.2 Token Distillation"
    - "Section 3.1.3 Multimodal Alignment"
    - "Section 3.2 Decoding"
    - "Section 3.2.1 Condition Decoding"
    - "Section 3.2.2 Prototype-Guided Flow Matching"
  equations:
    - "Equations (1)-(2): time-series patching and embedding"
    - "Equations (3)-(7): endogenous image rendering and image tokenization"
    - "Equations (8)-(11): vision/text encoding and token distillation"
    - "Equations (12)-(18): modality-guided attention correlation and temporal encoding"
    - "Equations (19)-(21): modality fusion"
    - "Equations (22)-(25): condition decoding, prototype retrieval, and flow-matching objective"
  algorithms:
    - "Algorithm 1: Prototype-Guided Flow Matching"
  code_files: []
  notes:
    - "This example uses text extracted from the user-provided PDF and does not reproduce original paper figures."
  unresolved_conflicts: []

panels:
  - id: "panel-inputs"
    label: "Multimodal inputs"
    purpose: "Represent the three input modalities and tokenization paths."
    zones: ["time series", "endogenous image", "text description"]
  - id: "panel-encoder"
    label: "Cross-modality encoder"
    purpose: "Represent token distillation, modality-guided temporal attention, and fusion."
    zones: ["pretrained encoders", "distillation", "guided attention", "fusion"]
  - id: "panel-decoder"
    label: "Generative decoder"
    purpose: "Represent condition decoding, prototype retrieval, and flow matching."
    zones: ["condition", "prototype", "flow matching", "forecast"]

